
<app-search-bar></app-search-bar>

<div class="cards">
@for (product of productsService.getFilteredMenu(); track product.id) {
<app-product-card [productData]="product">
</app-product-card>
}@empty {

    <div class="card text-bg-light mb-3 couldnt-match">
  <div class="card-body">
    <h5 class="card-title">No items matched your search: {{ productsService.searchText()}}</h5>
  </div>
  </div>

}
