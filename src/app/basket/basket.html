<div class="total-price-container">
<span>Total Price: <b class="green-text">{{ totalPrice() }}$</b> </span>
</div>

<div class="basket-container">
@for (item of basketItems(); track item.id) {
<app-product-card [productData]="item"[isCartMode]="true">
</app-product-card>
} @empty {
<div class="card text-bg-danger mb-3 basket-empty">
<h2>The basket is empty!</h2>

<div class="card-body">
<span>Navigate to the home page to add products in the basket!</span>
</div>

<button class="btn btn-outline-light" routerLink="/">Go to home page.</button>
</div>
}

</div>
